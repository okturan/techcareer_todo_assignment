services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${TODO_DB_NAME:-todo_db}
      POSTGRES_USER: ${TODO_DB_USERNAME:?Set TODO_DB_USERNAME in .env}
      POSTGRES_PASSWORD: ${TODO_DB_PASSWORD:?Set TODO_DB_PASSWORD in .env}
    ports:
      - "127.0.0.1:${TODO_DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TODO_DB_USERNAME} -d ${TODO_DB_NAME:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:${SERVER_PORT:-4444}:4444"
    environment:
      TODO_DB_URL: jdbc:postgresql://postgres:5432/${TODO_DB_NAME:-todo_db}
      TODO_DB_USERNAME: ${TODO_DB_USERNAME:?Set TODO_DB_USERNAME in .env}
      TODO_DB_PASSWORD: ${TODO_DB_PASSWORD:?Set TODO_DB_PASSWORD in .env}
      TODO_DDL_AUTO: ${TODO_DDL_AUTO:-update}
      TODO_SEED_ENABLED: ${TODO_SEED_ENABLED:-true}
      SERVER_PORT: 4444

volumes:
  postgres_data:
