<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app-shell">
        <header class="app-header">
            <div>
                <p class="eyebrow">Spring Boot + PostgreSQL</p>
                <h1>Todo workspace</h1>
                <p class="intro">A small, complete CRUD surface backed by a validated REST API.</p>
            </div>
            <a class="api-link" href="/swagger-ui/index.html">Explore the API <span aria-hidden="true">↗</span></a>
        </header>

        <section class="composer" aria-labelledby="composer-title">
            <div class="section-heading">
                <div>
                    <p class="section-kicker">New item</p>
                    <h2 id="composer-title">Capture the next task</h2>
                </div>
                <span class="validation-note">Both fields are required</span>
            </div>

            <form id="todoForm">
                <div class="field title-field">
                    <label for="title">Title</label>
                    <input type="text" id="title" name="title" autocomplete="off" placeholder="Review pull request" required>
                </div>
                <div class="field details-field">
                    <label for="details">Details</label>
                    <textarea id="details" name="details" placeholder="Run the test suite before merging" required></textarea>
                </div>
                <button class="primary-action" type="submit">Add task</button>
            </form>
            <p id="appStatus" class="app-status" role="status" aria-live="polite">Loading tasks…</p>
        </section>

        <section class="task-panel" aria-labelledby="task-list-title">
            <div class="section-heading task-heading">
                <div>
                    <p class="section-kicker">Workspace</p>
                    <h2 id="task-list-title">Current tasks</h2>
                </div>
                <span id="todoCount" class="todo-count">0 tasks</span>
            </div>
            <div id="todoList" class="todo-list" role="list" aria-label="Todo items"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
