# PostgreSQL configuration. Credentials are supplied by the environment.
spring.datasource.url=${TODO_DB_URL}
spring.datasource.username=${TODO_DB_USERNAME}
spring.datasource.password=${TODO_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Fail closed by default: a schema must already exist unless a development
# environment explicitly selects a different Hibernate policy.
spring.jpa.hibernate.ddl-auto=${TODO_DDL_AUTO:validate}
spring.jpa.show-sql=${TODO_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${TODO_FORMAT_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

todo.seed.enabled=${TODO_SEED_ENABLED:false}

server.port=${SERVER_PORT:4444}
management.endpoints.web.exposure.include=health,info
